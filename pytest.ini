[pytest]
# Configuración de pytest para el proyecto

# Directorio de tests
testpaths = tests

# Patrón de archivos de test
python_files = test_*.py

# Patrón de clases de test
python_classes = Test*

# Patrón de funciones de test
python_functions = test_*

# Opciones por defecto
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Marcadores personalizados
markers =
    selenium: Tests de Selenium (frontend)
    unit: Tests unitarios
    integration: Tests de integración
    slow: Tests que tardan más tiempo

# Configuración de cobertura
[coverage:run]
source = .
omit = 
    */tests/*
    */venv/*
    */node_modules/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
