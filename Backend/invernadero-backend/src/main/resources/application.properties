# ============================================
# INVERNADERO AUTOMATIZADO - CONFIGURACION PRINCIPAL
# Sistema de Gestion de Invernadero Automatizado
# ============================================

# Perfil activo (dev, prod)
spring.profiles.active=dev

# ============================================
# CONFIGURACION DEL SERVIDOR
# ============================================
server.port=8080
server.servlet.context-path=/api

# ============================================
# CONFIGURACION DE BASE DE DATOS (Configurada por Perfil)
# ============================================
# El DataSource genérico se inyecta por perfiles (dev, prod, test)

# Pool de conexiones genérico
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ============================================
# CONFIGURACION JPA / HIBERNATE (Configurada por Perfil)
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================================
# CONFIGURACION DE SEGURIDAD JWT
# ============================================
jwt.secret=TU_CLAVE_SECRETA_SUPER_SEGURA_CAMBIAR_EN_PRODUCCION_MIN_256_BITS
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ============================================
# CONFIGURACION OAUTH2 - GOOGLE
# ============================================
spring.security.oauth2.client.registration.google.client-id=185601263510-gici8ejvp2j6pl0rasgdhdme8kelbbsf.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=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
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/auth/oauth2/callback/{registrationId}

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# ============================================
# CONFIGURACION DE INTERNACIONALIZACION
# ============================================
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
spring.web.locale=es
spring.web.locale-resolver=accept_header

# ============================================
# CONFIGURACION DE SPRINGDOC / SWAGGER
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.packages-to-scan=com.invernadero.invernadero_backend

# ============================================
# CONFIGURACION DE LOGGING
# ============================================
logging.level.root=INFO
logging.level.com.invernadero.invernadero_backend=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Patron de logging
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Archivo de log
logging.file.name=logs/invernadero-backend.log
logging.file.max-size=10MB
logging.file.max-history=30

# ============================================
# CONFIGURACION DE CORS
# ============================================
cors.allowed-origins=http://localhost:3000,http://localhost:5173
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# ============================================
# CONFIGURACION DE ACTUATOR (MONITOREO)
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

