# ============================================
# PERFIL DE DESARROLLO
# ============================================

# Base de datos local
spring.datasource.url=jdbc:postgresql://localhost:5432/invernadero_db
spring.datasource.username=postgres
spring.datasource.password=1234

# JPA en desarrollo
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging detallado
logging.level.com.invernadero.invernadero_backend=DEBUG
logging.level.org.springframework.security=DEBUG

# DevTools habilitado
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# CORS permisivo en desarrollo
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:8080
